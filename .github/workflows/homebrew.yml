name: Publish Homebrew Cask

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish to Homebrew, for example v0.1.6"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-homebrew-cask:
    name: Publish Homebrew cask
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    permissions:
      contents: read

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: xjeway/homebrew-mcp-manager
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: tap

      - name: Render cask
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: node scripts/homebrew-cask.mjs publish --tap-dir tap --owner xjeway --repo mcp-manager --tag "$RELEASE_TAG"

      - name: Commit cask update
        working-directory: tap
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Homebrew cask is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/mcp-manager.rb
          git commit -m "Update mcp-manager cask to ${{ github.event.release.tag_name }}"
          git push
